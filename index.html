<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Expert Work · Portal de Créditos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root{
    --primary:#1565C0; --primary-2:#1976D2; --primary-3:#2196F3;
    --navy:#0C2440; --navy-2:#10325A;
    --success:#22C55E; --success-ink:#0F7A3D;
    --warning:#F59E0B; --warning-ink:#B5710A;
    --error:#EF4444; --error-ink:#C62828;
    --bg:#F8FAFC; --card:#FFFFFF;
    --ink:#0E1B2E; --ink-2:#475569; --ink-3:#8A9CB3; --ink-4:#C2CEDD;
    --line:#E8EDF4; --line-2:#F1F5FA;
    --r:14px; --r-sm:10px; --r-lg:20px;
    --sh-sm:0 1px 2px rgba(14,27,46,.05);
    --sh:0 1px 2px rgba(14,27,46,.04), 0 4px 16px rgba(14,27,46,.05);
    --sh-md:0 4px 12px rgba(14,27,46,.06), 0 12px 32px rgba(14,27,46,.07);
    --sh-lg:0 18px 50px rgba(14,27,46,.14);
    --sh-blue:0 12px 30px rgba(21,101,192,.30);
    --ff:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{font-family:var(--ff);background:var(--bg);color:var(--ink);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  .num{font-variant-numeric:tabular-nums;font-feature-settings:"tnum" 1,"cv01" 1}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  a{color:inherit;text-decoration:none}
  :focus-visible{outline:2px solid var(--primary-2);outline-offset:2px;border-radius:6px}
  ::-webkit-scrollbar{height:8px;width:8px}
  ::-webkit-scrollbar-thumb{background:#cdd8e6;border-radius:8px}
  ::-webkit-scrollbar-thumb:hover{background:#b3c2d6}
  @media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}

  /* ============ Shell ============ */
  .app{display:flex;min-height:100vh}
  .sidebar{width:252px;flex:0 0 252px;background:linear-gradient(180deg,var(--navy) 0%,#0A1F38 100%);color:#E8F0FB;display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
  .brand{padding:24px 22px 20px;display:flex;gap:13px;align-items:center}
  .brand .mark{width:40px;height:40px;border-radius:11px;flex:0 0 40px;background:linear-gradient(135deg,var(--primary-2),var(--primary-3));display:grid;place-items:center;box-shadow:0 6px 16px rgba(33,150,243,.35)}
  .brand h1{font-size:14.5px;font-weight:800;letter-spacing:-.2px;line-height:1.2}
  .brand p{font-size:11px;color:#9DB6D6;margin-top:2px;font-weight:500}
  .nav{padding:10px 14px;display:flex;flex-direction:column;gap:3px;flex:1}
  .nav-label{font-size:10px;text-transform:uppercase;letter-spacing:1.2px;color:#5E789A;padding:14px 12px 7px;font-weight:700}
  .navlink{display:flex;align-items:center;gap:13px;width:100%;padding:11px 13px;border-radius:11px;color:#BDD0EA;font-size:13.5px;font-weight:600;text-align:left;position:relative;transition:background .16s,color .16s}
  .navlink svg{width:19px;height:19px;flex:0 0 19px;stroke:currentColor;stroke-width:2}
  .navlink:hover{background:rgba(255,255,255,.06);color:#fff}
  .navlink.active{background:linear-gradient(135deg,var(--primary),var(--primary-2));color:#fff;box-shadow:0 8px 18px rgba(21,101,192,.42)}
  .sidebar-foot{padding:16px 18px;border-top:1px solid rgba(255,255,255,.09)}
  .sidebar-foot .meta{font-size:10.5px;color:#7E97B8;line-height:1.6;margin-bottom:12px}
  .logout-btn{display:flex;align-items:center;gap:10px;width:100%;padding:10px 13px;border-radius:11px;color:#BDD0EA;font-size:13px;font-weight:600;border:1px solid rgba(255,255,255,.14);transition:background .16s,color .16s}
  .logout-btn:hover{background:rgba(255,255,255,.08);color:#fff}
  .logout-btn svg{width:17px;height:17px;stroke:currentColor;stroke-width:2}

  .main{flex:1;min-width:0;display:flex;flex-direction:column}
  .topbar{background:rgba(255,255,255,.82);backdrop-filter:saturate(180%) blur(14px);border-bottom:1px solid var(--line);padding:15px 34px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:20}
  .topbar .ttl{flex:1;min-width:0}
  .topbar .ttl h2{font-size:18.5px;font-weight:800;letter-spacing:-.4px;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .topbar .ttl p{font-size:12.5px;color:var(--ink-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .company{display:flex;align-items:center;gap:11px;padding:6px 14px 6px 7px;border:1px solid var(--line);border-radius:999px;background:#fff;box-shadow:var(--sh-sm)}
  .company .av{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,var(--primary),var(--primary-2));display:grid;place-items:center;color:#fff;font-weight:800;font-size:12.5px;flex:0 0 32px}
  .company .nm{font-size:12.5px;font-weight:700;line-height:1.15}
  .company .sg{font-size:11px;color:var(--ink-3);font-weight:500}
  .content{padding:30px 34px 64px;max-width:1240px;width:100%;margin:0 auto}

  /* ============ Cards / structure ============ */
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh)}
  .card-h{padding:19px 22px 0;display:flex;align-items:center;justify-content:space-between;gap:12px}
  .card-h h3{font-size:14.5px;font-weight:800;letter-spacing:-.2px}
  .card-h .sub{font-size:11.5px;color:var(--ink-3);font-weight:600}
  .grid{display:grid;gap:20px}
  .sec{display:flex;align-items:baseline;justify-content:space-between;margin:34px 2px 15px;gap:14px}
  .sec h3{font-size:16.5px;font-weight:800;letter-spacing:-.3px}
  .sec .hint{font-size:12.5px;color:var(--ink-3);font-weight:500}

  /* ============ Hero / credit allocation (signature) ============ */
  .hero{background:linear-gradient(135deg,#0F4FA3 0%,#1565C0 42%,#1E78D6 100%);border-radius:var(--r-lg);color:#fff;padding:30px 32px;position:relative;overflow:hidden;box-shadow:var(--sh-blue)}
  .hero::after{content:"";position:absolute;right:-80px;top:-100px;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.14),transparent 70%)}
  .hero::before{content:"";position:absolute;right:90px;bottom:-130px;width:240px;height:240px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.10),transparent 70%)}
  .hero>*{position:relative;z-index:1}
  .hero-top{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap}
  .hero-eyebrow{display:flex;align-items:center;gap:9px;font-size:12px;font-weight:700;letter-spacing:.4px;color:#CFE3FF;text-transform:uppercase}
  .health{display:inline-flex;align-items:center;gap:6px;padding:4px 11px;border-radius:999px;font-size:11px;font-weight:700;letter-spacing:.2px;text-transform:none}
  .health.ok{background:rgba(34,197,94,.22);color:#C8FFDD;border:1px solid rgba(34,197,94,.45)}
  .health.low{background:rgba(245,158,11,.24);color:#FFE6B8;border:1px solid rgba(245,158,11,.5)}
  .health .d{width:7px;height:7px;border-radius:50%;background:currentColor}
  .bal{font-size:clamp(36px,5.2vw,50px);font-weight:900;letter-spacing:-1.6px;line-height:1.02;margin-top:8px}
  .bal .cur{font-size:.42em;font-weight:700;opacity:.78;margin-right:6px;letter-spacing:0;vertical-align:.18em}
  .hero-pill{display:inline-flex;align-items:center;gap:7px;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.22);padding:8px 13px;border-radius:999px;font-size:12px;font-weight:600;backdrop-filter:blur(4px)}
  .hero-pill svg{width:14px;height:14px;stroke:#fff;stroke-width:2}

  .alloc{margin-top:26px}
  .alloc-bar{height:16px;border-radius:999px;background:rgba(255,255,255,.16);display:flex;overflow:hidden;gap:3px;padding:0}
  .alloc-bar span{display:block;height:100%;transition:width .5s cubic-bezier(.4,0,.2,1)}
  .alloc-bar .s-used{background:linear-gradient(90deg,#FF5A4D,#FF8A7A)}
  .alloc-bar .s-res{background:linear-gradient(90deg,#F5A623,#FFCF6B)}
  .alloc-bar .s-free{background:linear-gradient(90deg,#22C55E,#7CEAA8)}
  .alloc-legend{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin-top:20px}
  .alloc-legend .it .lab{display:flex;align-items:center;gap:8px;font-size:11.5px;color:#CFE3FF;font-weight:600}
  .alloc-legend .it .dot{width:10px;height:10px;border-radius:3px;flex:0 0 10px}
  .alloc-legend .it .val{font-size:18px;font-weight:800;letter-spacing:-.4px;margin-top:5px}
  .alloc-legend .it .pct{font-size:11px;color:#A9C7EE;font-weight:600;margin-top:1px}
  .d-dep{background:#fff}.d-used{background:#FF7A6E}.d-res{background:#FFCF6B}.d-free{background:#7CEAA8}

  /* ============ Stat cards ============ */
  .stats{display:grid;grid-template-columns:repeat(5,1fr);gap:15px}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:17px 17px 16px;box-shadow:var(--sh);transition:transform .18s,box-shadow .18s}
  .stat:hover{transform:translateY(-3px);box-shadow:var(--sh-md)}
  .stat .ic{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;margin-bottom:13px}
  .stat .ic svg{width:20px;height:20px;stroke-width:2.1}
  .stat .n{font-size:27px;font-weight:900;letter-spacing:-1px;line-height:1}
  .stat .l{font-size:12px;color:var(--ink-2);font-weight:600;margin-top:4px}

  /* ============ Charts ============ */
  .chart-wrap{padding:18px 22px 22px}
  .donut-box{position:relative;height:206px}
  .donut-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none}
  .donut-center .c-n{font-size:21px;font-weight:900;letter-spacing:-.6px}
  .donut-center .c-l{font-size:10.5px;color:var(--ink-3);font-weight:700;text-transform:uppercase;letter-spacing:.6px;margin-top:2px}
  .legend{margin-top:18px;display:flex;flex-direction:column;gap:11px}
  .legend .row{display:flex;align-items:center;gap:11px;font-size:13px}
  .legend .row .dot{width:11px;height:11px;border-radius:4px;flex:0 0 11px}
  .legend .row .nm{flex:1;color:var(--ink);font-weight:600;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .legend .row .vl{color:var(--ink-2);font-weight:700}
  .legend .row .pc{color:var(--ink-3);min-width:42px;text-align:right;font-weight:700}
  .barchart{height:248px;padding:8px 0 2px}

  /* ============ Badges ============ */
  .badge{display:inline-flex;align-items:center;gap:6px;padding:4px 11px;border-radius:999px;font-size:11.5px;font-weight:700;white-space:nowrap;line-height:1.3}
  .badge .b-dot{width:6px;height:6px;border-radius:50%}
  .b-green{background:#E4F7EC;color:var(--success-ink)}.b-green .b-dot{background:var(--success)}
  .b-amber{background:#FEF1D7;color:var(--warning-ink)}.b-amber .b-dot{background:var(--warning)}
  .b-blue{background:#E6F0FB;color:var(--primary)}.b-blue .b-dot{background:var(--primary-2)}
  .b-red{background:#FDEAEA;color:var(--error-ink)}.b-red .b-dot{background:var(--error)}
  .b-slate{background:#EDF1F7;color:#5A6B82}.b-slate .b-dot{background:#94A3B8}
  .chip-date{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;color:var(--ink-3)}
  .chip-date svg{width:13px;height:13px;stroke:currentColor;stroke-width:2}

  /* ============ OS card (lighter, status accent) ============ */
  .os-list{overflow:hidden}
  .osr{display:flex;align-items:stretch;width:100%;text-align:left;border-bottom:1px solid var(--line);position:relative;transition:background .15s}
  .osr:last-child{border-bottom:none}
  .osr:hover{background:var(--line-2)}
  .osr::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--sc);border-radius:0 3px 3px 0}
  .osr__body{flex:1;min-width:0;display:flex;flex-direction:column;gap:8px;padding:16px 18px 16px 22px}
  .osr__top{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .osr__id{font-size:11px;font-weight:800;color:var(--ink-3);letter-spacing:.4px;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .osr__status{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:800;white-space:nowrap;flex:0 0 auto}
  .osr__status .d{width:7px;height:7px;border-radius:50%;background:currentColor}
  .osr__title{font-size:14.5px;font-weight:700;line-height:1.32;letter-spacing:-.1px;color:var(--ink)}
  .osr__bottom{display:flex;align-items:center;justify-content:space-between;gap:12px}
  .osr__meta{display:flex;align-items:center;gap:9px;flex-wrap:wrap}
  .osr__val{text-align:right;white-space:nowrap}
  .osr__val .v{font-size:15.5px;font-weight:800;letter-spacing:-.3px}
  .osr__val .l{font-size:10px;color:var(--ink-3);font-weight:700;text-transform:uppercase;letter-spacing:.4px}
  .osr__prog{display:flex;align-items:center;gap:11px;margin-top:1px}
  .osr__prog .bar{flex:1;height:6px;border-radius:999px;background:#E8EDF4;overflow:hidden}
  .osr__prog .bar>i{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,var(--primary),var(--primary-3))}
  .osr__prog .pct{font-size:11px;color:var(--ink-2);font-weight:700;white-space:nowrap}
  .osr__chev{flex:0 0 auto;display:grid;place-items:center;padding-right:16px;color:var(--ink-4)}
  .osr__chev svg{width:20px;height:20px;stroke-width:2.2}
  .ver-todas{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:15px;font-size:13.5px;font-weight:800;color:var(--primary);border-top:1px solid var(--line);transition:background .14s}
  .ver-todas:hover{background:var(--line-2)}
  .ver-todas svg{width:16px;height:16px;stroke:currentColor;stroke-width:2.4}
  /* OS toolbar */
  .os-toolbar{display:flex;flex-direction:column;gap:14px;margin-bottom:16px}
  .os-chips{display:flex;gap:9px;overflow-x:auto;padding-bottom:2px}
  .os-chips::-webkit-scrollbar{height:0}
  .os-chip{flex:0 0 auto;display:inline-flex;align-items:center;gap:8px;padding:9px 15px;border-radius:999px;font-size:13px;font-weight:700;color:var(--ink-2);border:1px solid var(--line);background:#fff;white-space:nowrap;transition:all .14s}
  .os-chip:hover{border-color:var(--primary-2);color:var(--primary)}
  .os-chip.active{background:var(--primary);color:#fff;border-color:var(--primary);box-shadow:0 6px 14px rgba(21,101,192,.26)}
  .os-chip .ct{font-size:11px;font-weight:800;background:rgba(15,27,45,.07);padding:1px 8px;border-radius:999px}
  .os-chip.active .ct{background:rgba(255,255,255,.22)}
  .os-controls{display:flex;gap:12px;align-items:center}
  .os-search{flex:1;position:relative;min-width:0}
  .os-search svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);width:17px;height:17px;stroke:var(--ink-3);stroke-width:2}
  .os-search input{width:100%;padding:11px 14px 11px 40px;border:1px solid var(--line);border-radius:11px;font-size:14px;font-family:inherit;background:#fff;color:var(--ink)}
  .os-search input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(21,101,192,.12)}
  .os-sort{position:relative;flex:0 0 auto}
  .os-sort select{appearance:none;-webkit-appearance:none;padding:11px 40px 11px 14px;border:1px solid var(--line);border-radius:11px;font-size:13.5px;font-weight:600;font-family:inherit;background:#fff;color:var(--ink);cursor:pointer}
  .os-sort select:focus{outline:none;border-color:var(--primary)}
  .os-sort::after{content:"";position:absolute;right:15px;top:46%;width:8px;height:8px;border-right:2px solid var(--ink-3);border-bottom:2px solid var(--ink-3);transform:translateY(-50%) rotate(45deg);pointer-events:none}
  .os-empty{padding:56px 24px;text-align:center;color:var(--ink-3)}
  .os-empty svg{width:42px;height:42px;stroke:var(--ink-4);stroke-width:1.6;margin-bottom:13px}
  .os-empty .t{font-size:15px;font-weight:800;color:var(--ink-2)}
  .os-empty .s{font-size:13px;margin-top:5px}
  /* ============ Lists: agenda + alertas ============ */
  .list-body{padding:6px 22px 16px}
  .agenda{display:flex;gap:15px;padding:15px 0;border-bottom:1px solid var(--line)}
  .agenda:last-child{border-bottom:none}
  .agenda-date{flex:0 0 58px;text-align:center;background:linear-gradient(160deg,#EEF5FD,#E3EFFB);border-radius:12px;padding:9px 4px;align-self:flex-start;border:1px solid #DCEAFB}
  .agenda-date .d{font-size:19px;font-weight:900;color:var(--primary);line-height:1;letter-spacing:-.5px}
  .agenda-date .m{font-size:10px;font-weight:800;color:var(--primary-2);text-transform:uppercase;letter-spacing:.6px;margin-top:3px}
  .agenda-main{flex:1;min-width:0}
  .agenda-main .t{font-size:13.5px;font-weight:700;line-height:1.32}
  .agenda-meta{display:flex;flex-wrap:wrap;gap:7px 14px;margin-top:7px;font-size:12px;color:var(--ink-2)}
  .agenda-meta span{display:inline-flex;align-items:center;gap:5px}
  .agenda-meta svg{width:13px;height:13px;stroke:var(--ink-3);stroke-width:2}
  .agenda-cr{flex:0 0 auto;text-align:right;align-self:center}
  .agenda-cr .v{font-size:14.5px;font-weight:800;color:var(--primary);letter-spacing:-.3px}
  .agenda-cr .x{font-size:10px;color:var(--ink-3);font-weight:700;text-transform:uppercase;letter-spacing:.3px}

  .alert{display:flex;gap:13px;padding:14px 0;border-bottom:1px solid var(--line)}
  .alert:last-child{border-bottom:none}
  .alert .ic{width:36px;height:36px;border-radius:10px;flex:0 0 36px;display:grid;place-items:center}
  .alert .ic svg{width:18px;height:18px;stroke-width:2}
  .alert .tx .m{font-size:13px;font-weight:600;line-height:1.4}
  .alert .tx .d{font-size:11.5px;color:var(--ink-3);margin-top:3px;font-weight:600}

  /* ============ OS detail ============ */
  .back{display:inline-flex;align-items:center;gap:8px;font-size:13px;font-weight:700;color:var(--primary);padding:9px 14px;margin-bottom:14px;border-radius:10px;border:1px solid var(--line);background:#fff;box-shadow:var(--sh-sm);transition:border-color .15s,color .15s}
  .back:hover{border-color:var(--primary-2)}
  .back svg{width:17px;height:17px;stroke:currentColor;stroke-width:2.2}
  .dhead{display:flex;align-items:flex-start;gap:18px;padding:24px}
  .dhead .big{width:58px;height:58px;border-radius:15px;flex:0 0 58px;display:grid;place-items:center;background:var(--osbg)}
  .dhead .big svg{width:28px;height:28px;stroke:var(--osfg);stroke-width:2}
  .dhead .m{flex:1;min-width:0}
  .dhead .id{font-size:12px;font-weight:800;color:var(--ink-3);letter-spacing:.5px;text-transform:uppercase}
  .dhead .t{font-size:21px;font-weight:900;letter-spacing:-.5px;margin-top:3px;line-height:1.25}
  .dhead .tags{display:flex;gap:9px;margin-top:14px;flex-wrap:wrap}
  .dgrid{display:grid;grid-template-columns:1.35fr 1fr;gap:20px;margin-top:20px}
  .info{padding:4px 22px 18px}
  .info-row{display:flex;justify-content:space-between;gap:16px;padding:13px 0;border-bottom:1px solid var(--line);font-size:13.5px}
  .info-row:last-child{border-bottom:none}
  .info-row .k{color:var(--ink-2);font-weight:600}
  .info-row .v{font-weight:700;text-align:right}
  .fin{padding:4px 22px 20px}
  .fin-grid{display:grid;grid-template-columns:1fr 1fr;gap:13px}
  .fin-box{background:linear-gradient(160deg,#F8FBFE,#F2F7FC);border:1px solid var(--line);border-radius:12px;padding:15px}
  .fin-box .l{font-size:11px;color:var(--ink-2);font-weight:700;text-transform:uppercase;letter-spacing:.4px}
  .fin-box .v{font-size:22px;font-weight:900;letter-spacing:-.6px;margin-top:7px}
  .fin-prog{margin-top:15px}
  .fin-prog .track{height:9px;border-radius:999px;background:#E8EDF4;overflow:hidden}
  .fin-prog .fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--primary),var(--primary-3))}
  .fin-prog .cap{display:flex;justify-content:space-between;font-size:11.5px;color:var(--ink-2);font-weight:600;margin-top:8px}
  .fin-status{display:flex;align-items:center;justify-content:space-between;margin-top:15px;padding-top:15px;border-top:1px solid var(--line)}
  .fin-status .l{font-size:12px;color:var(--ink-2);font-weight:700;text-transform:uppercase;letter-spacing:.4px}

  .timeline{padding:8px 24px 24px;position:relative}
  .tl{display:flex;gap:17px;position:relative;padding-bottom:22px}
  .tl:last-child{padding-bottom:0}
  .tl-dot{flex:0 0 14px;width:14px;height:14px;border-radius:50%;margin-top:2px;border:3px solid #fff;box-shadow:0 0 0 2px currentColor;z-index:1}
  .tl-line{position:absolute;left:6px;top:8px;bottom:10px;width:2px;background:var(--line)}
  .tl-body .tl-t{font-size:13.5px;font-weight:800}
  .tl-body .tl-d{font-size:12px;color:var(--ink-3);margin-top:2px;font-weight:600}
  .tl-body .tl-x{font-size:12.5px;color:var(--ink-2);margin-top:6px;line-height:1.5}

  .gallery{padding:8px 22px 22px;display:grid;grid-template-columns:repeat(3,1fr);gap:13px}
  .ph{aspect-ratio:4/3;border-radius:13px;overflow:hidden;cursor:pointer;border:1px solid var(--line);position:relative;background:#EEF2F7}
  .ph img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s}
  .ph:hover img{transform:scale(1.06)}
  .ph .tag{position:absolute;left:9px;bottom:9px;background:rgba(12,24,46,.74);color:#fff;font-size:10.5px;font-weight:700;padding:4px 9px;border-radius:7px;backdrop-filter:blur(4px)}

  /* ============ Tables (→ cards no mobile) ============ */
  .filters{display:flex;gap:9px;padding:18px 22px;border-bottom:1px solid var(--line);flex-wrap:wrap}
  .filters button{padding:9px 17px;border-radius:10px;font-size:13px;font-weight:700;color:var(--ink-2);border:1px solid var(--line);background:#fff;transition:all .14s}
  .filters button:hover{border-color:var(--primary-2);color:var(--primary)}
  .filters button.active{background:var(--primary);color:#fff;border-color:var(--primary);box-shadow:0 6px 14px rgba(21,101,192,.28)}
  .tbl-scroll{overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:13.5px}
  thead th{text-align:left;padding:14px 22px;font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--ink-3);font-weight:800;border-bottom:1px solid var(--line);white-space:nowrap;background:#FBFCFE}
  tbody td{padding:15px 22px;border-bottom:1px solid var(--line);vertical-align:middle}
  tbody tr:last-child td{border-bottom:none}
  tbody tr{transition:background .12s}
  tbody tr:hover{background:var(--line-2)}
  td.amount{text-align:right;font-weight:800;white-space:nowrap}
  .amt-in{color:var(--success-ink)}.amt-out{color:var(--ink)}
  .t-desc{font-weight:700}
  .t-sub{font-size:11.5px;color:var(--ink-3);font-weight:600;margin-top:2px}
  .receipt{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:700;color:var(--primary);border:1px solid var(--line);padding:5px 11px;border-radius:8px;background:#fff}
  .receipt svg{width:14px;height:14px;stroke:var(--primary);stroke-width:2}
  .strip{display:flex;gap:16px;padding:19px 22px;border-top:1px solid var(--line);flex-wrap:wrap;background:#FBFCFE;border-radius:0 0 var(--r) var(--r)}
  .strip .it{flex:1;min-width:140px}
  .strip .it .l{font-size:11px;color:var(--ink-3);font-weight:700;text-transform:uppercase;letter-spacing:.4px}
  .strip .it .v{font-size:19px;font-weight:900;letter-spacing:-.5px;margin-top:4px}

  /* ============ Modal ============ */
  .modal{position:fixed;inset:0;background:rgba(8,16,30,.82);display:none;align-items:center;justify-content:center;z-index:100;padding:24px;backdrop-filter:blur(4px)}
  .modal.open{display:flex}
  .modal img{max-width:min(880px,92vw);max-height:84vh;border-radius:16px;box-shadow:0 30px 80px rgba(0,0,0,.55)}
  .modal .close{position:absolute;top:20px;right:24px;width:46px;height:46px;border-radius:50%;background:rgba(255,255,255,.16);color:#fff;display:grid;place-items:center;font-size:24px;transition:background .15s}
  .modal .close:hover{background:rgba(255,255,255,.28)}
  .modal .cap{position:absolute;bottom:28px;left:0;right:0;text-align:center;color:#fff;font-size:13.5px;font-weight:700}

  /* ============ Tab bar (mobile) ============ */
  .tabbar{display:none}

  /* ============ Login ============ */
  .login{position:fixed;inset:0;background:radial-gradient(1200px 700px at 80% -10%,#1E78D6,transparent 60%),linear-gradient(150deg,#0C2440 0%,#0E2E54 60%,#123F6E 100%);display:flex;align-items:center;justify-content:center;padding:24px;z-index:200}
  .login-card{position:relative;width:100%;max-width:412px;background:#fff;border-radius:22px;box-shadow:0 40px 90px rgba(0,0,0,.45);padding:38px 34px;z-index:1}
  .login-brand{display:flex;flex-direction:column;align-items:center;gap:8px}
  /* ===== Marca — wordmark Expert Work (sem logo por ora) ===== */
  .brand-img{display:none}
  .brand-badge{display:none}
  .brand-fallback{display:flex;flex-direction:column;align-items:center;gap:10px}
  .brand-fallback.row{flex-direction:row;gap:11px;align-items:center}
  .wordmark{font-family:'Space Grotesk',system-ui,sans-serif;display:flex;align-items:baseline;gap:.14em;font-style:normal;font-weight:700;letter-spacing:-.015em;line-height:1;font-size:30px;text-transform:uppercase}
  .wordmark .s{color:var(--ink)}.wordmark .d{color:var(--primary,#1565C0)}
  .brand-fallback.row .wordmark{font-size:19px}
  .brand-sub{font-family:'Space Grotesk',system-ui,sans-serif;font-size:11px;color:var(--ink-3);font-weight:600;letter-spacing:.16em;text-transform:uppercase}
  .sidebar .wordmark .s{color:#EAF1FB}.sidebar .wordmark .d{color:#7CB8F2}
  .login-brand .mark{width:44px;height:44px;border-radius:12px;flex:0 0 44px;background:linear-gradient(135deg,var(--primary),var(--primary-3));display:grid;place-items:center;box-shadow:var(--sh-blue)}
  .login-brand h1{font-size:17px;font-weight:900;letter-spacing:-.3px}
  .login-brand p{font-size:12px;color:var(--ink-3);margin-top:1px;font-weight:500}
  .login-card .hello{font-size:14px;color:var(--ink-2);margin:22px 0 2px;font-weight:500}
  .login-card label{display:block;font-size:12px;font-weight:700;color:var(--ink-2);margin:18px 0 7px}
  .field{position:relative}
  .field svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);width:17px;height:17px;stroke:var(--ink-3);stroke-width:2}
  .login-card input{width:100%;padding:13px 14px 13px 40px;border:1px solid var(--line);border-radius:11px;font-size:14px;font-family:inherit;color:var(--ink);background:#FBFCFE;transition:border-color .14s,box-shadow .14s}
  .login-card input:focus{outline:none;border-color:var(--primary);background:#fff;box-shadow:0 0 0 3px rgba(21,101,192,.13)}
  .login-btn{width:100%;margin-top:24px;padding:14px;border-radius:11px;background:linear-gradient(135deg,var(--primary),var(--primary-2));color:#fff;font-size:14.5px;font-weight:800;box-shadow:var(--sh-blue);transition:transform .12s,filter .12s}
  .login-btn:hover{transform:translateY(-1px);filter:brightness(1.05)}
  .login-btn:active{transform:translateY(0)}
  .login-err{margin-top:15px;font-size:13px;color:var(--error-ink);font-weight:700;display:none;align-items:center;gap:8px;background:#FDEAEA;padding:11px 13px;border-radius:10px}
  .login-err.show{display:flex}
  .login-err svg{width:16px;height:16px;stroke:currentColor;stroke-width:2;flex:0 0 16px}
  .login-note{margin-top:22px;padding-top:18px;border-top:1px solid var(--line);font-size:11.5px;color:var(--ink-3);text-align:center;line-height:1.6}


  /* ============ OS detalhe — resumo rápido (KPIs) ============ */
  .os-kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(168px,1fr));gap:14px;margin-bottom:20px}
  .os-kpi{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:15px 16px;box-shadow:var(--sh);display:flex;gap:13px;align-items:center}
  .os-kpi .ic{width:40px;height:40px;border-radius:12px;flex:0 0 40px;display:grid;place-items:center}
  .os-kpi .ic svg{width:20px;height:20px;stroke-width:2.1}
  .os-kpi .tx{min-width:0}
  .os-kpi .tx .n{font-size:20px;font-weight:900;letter-spacing:-.6px;line-height:1;white-space:nowrap}
  .os-kpi .tx .l{font-size:11px;color:var(--ink-2);font-weight:700;margin-top:4px;text-transform:uppercase;letter-spacing:.3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

  /* meta chips no cabeçalho da OS */
  .dhead-meta{display:flex;flex-wrap:wrap;gap:8px 9px;margin-top:14px}
  .metachip{display:inline-flex;align-items:center;gap:7px;font-size:12px;font-weight:600;color:var(--ink-2);background:#F4F8FD;border:1px solid var(--line);padding:6px 12px;border-radius:9px;max-width:100%}
  .metachip svg{width:13px;height:13px;flex:0 0 13px;stroke:var(--ink-3);stroke-width:2}
  .metachip span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

  /* ============ Equipe em campo ============ */
  .team-count{display:inline-flex;align-items:center;gap:7px;background:#E6F0FB;color:var(--primary);font-weight:800;font-size:12.5px;padding:6px 13px;border-radius:999px;white-space:nowrap}
  .team-count svg{width:15px;height:15px;stroke:currentColor;stroke-width:2.2}
  .team{padding:4px 22px 20px}
  .team-resp{display:flex;align-items:center;gap:14px;padding:14px 0 17px;border-bottom:1px solid var(--line);flex-wrap:wrap}
  .team-resp .av{width:48px;height:48px;border-radius:14px;flex:0 0 48px;display:grid;place-items:center;color:#fff;font-weight:800;font-size:16px;box-shadow:var(--sh-sm)}
  .team-resp .who{min-width:0}
  .team-resp .who .n{font-size:15.5px;font-weight:800;letter-spacing:-.2px}
  .team-resp .who .r{font-size:12px;color:var(--ink-3);font-weight:700;margin-top:2px}
  .team-resp .sup{margin-left:auto;text-align:right}
  .team-resp .sup .l{font-size:10.5px;color:var(--ink-3);font-weight:800;text-transform:uppercase;letter-spacing:.4px}
  .team-resp .sup .v{font-size:13px;font-weight:700;margin-top:3px}
  .team-member{display:flex;align-items:center;gap:13px;padding:13px 0;border-bottom:1px solid var(--line-2)}
  .team-member:last-child{border-bottom:none}
  .team-member .av{width:38px;height:38px;border-radius:11px;flex:0 0 38px;display:grid;place-items:center;color:#fff;font-weight:800;font-size:13px}
  .team-member .mid{flex:1;min-width:0}
  .team-member .mid .n{font-size:13.5px;font-weight:700;display:flex;align-items:center;gap:8px;flex-wrap:wrap;line-height:1.3}
  .team-member .mid .sub{font-size:11.5px;color:var(--ink-3);font-weight:600;margin-top:3px;line-height:1.35}
  .team-member .hrs{text-align:right;flex:0 0 auto}
  .team-member .hrs .v{font-size:15.5px;font-weight:800;letter-spacing:-.3px}
  .team-member .hrs .l{font-size:9.5px;color:var(--ink-3);font-weight:800;text-transform:uppercase;letter-spacing:.4px;margin-top:1px}
  .lead-tag{font-size:9.5px;font-weight:800;color:var(--primary);background:#E6F0FB;padding:2px 8px;border-radius:6px;text-transform:uppercase;letter-spacing:.4px}
  .team-total{display:flex;align-items:center;gap:16px;margin-top:16px;padding-top:16px;border-top:1px solid var(--line);flex-wrap:wrap}
  .team-total .tt-l{font-size:11px;color:var(--ink-3);font-weight:800;text-transform:uppercase;letter-spacing:.4px}
  .team-total .tt-v{font-size:23px;font-weight:900;letter-spacing:-.7px;margin-top:2px}
  .team-total .tt-v small{font-size:13px;color:var(--ink-3);font-weight:700;letter-spacing:0}
  .hbar{flex:1;min-width:140px}
  .hbar .track{height:9px;border-radius:999px;background:#E8EDF4;overflow:hidden}
  .hbar .fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--primary),var(--primary-3))}
  .hbar .cap{font-size:11px;color:var(--ink-2);font-weight:700;margin-top:7px;text-align:right}

  /* ============ Apontamento de horas ============ */
  .appt{padding:4px 22px 14px}
  .appt-row{display:flex;gap:14px;padding:15px 0;border-bottom:1px solid var(--line)}
  .appt-row:last-child{border-bottom:none}
  .appt-date{flex:0 0 56px;text-align:center;background:linear-gradient(160deg,#EEF5FD,#E3EFFB);border:1px solid #DCEAFB;border-radius:12px;padding:9px 4px;align-self:flex-start}
  .appt-date .d{font-size:18px;font-weight:900;color:var(--primary);line-height:1;letter-spacing:-.5px}
  .appt-date .m{font-size:10px;font-weight:800;color:var(--primary-2);text-transform:uppercase;letter-spacing:.5px;margin-top:3px}
  .appt-main{flex:1;min-width:0}
  .appt-main .a{font-size:13.5px;font-weight:700;line-height:1.35}
  .appt-people{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px}
  .ppl{display:inline-flex;align-items:center;gap:6px;background:#F4F8FD;border:1px solid var(--line);border-radius:999px;padding:3px 11px 3px 4px;font-size:11.5px;font-weight:600}
  .ppl .dot{width:19px;height:19px;border-radius:50%;flex:0 0 19px;display:grid;place-items:center;color:#fff;font-size:8.5px;font-weight:800}
  .ppl .h{color:var(--ink-3);font-weight:800}
  .appt-h{flex:0 0 auto;text-align:right;align-self:center}
  .appt-h .v{font-size:15.5px;font-weight:800;letter-spacing:-.3px}
  .appt-h .l{font-size:9.5px;color:var(--ink-3);font-weight:800;text-transform:uppercase;letter-spacing:.4px}
  .appt-foot{display:flex;align-items:center;justify-content:space-between;padding:15px 22px;background:#FBFCFE;border-top:1px solid var(--line);border-radius:0 0 var(--r) var(--r)}
  .appt-foot .fl{font-size:12px;color:var(--ink-2);font-weight:800;text-transform:uppercase;letter-spacing:.4px}
  .appt-foot .fv{font-size:18px;font-weight:900;letter-spacing:-.5px;color:var(--primary)}

  /* ============ Escopo, checklist, materiais ============ */
  .scope{padding:6px 22px 20px;font-size:13.5px;line-height:1.6;color:var(--ink-2)}
  .scope p{margin-bottom:13px}
  .scope p:last-child{margin-bottom:0}
  .diag-box{background:#FFF8EC;border:1px solid #FCE3B6;border-left:3px solid var(--warning);border-radius:11px;padding:13px 15px}
  .diag-box .l{font-size:10.5px;font-weight:800;color:var(--warning-ink);text-transform:uppercase;letter-spacing:.5px}
  .diag-box p{margin:6px 0 0;color:var(--ink);font-weight:500}
  .checks{padding:6px 22px 18px}
  .check{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--line-2);font-size:13.5px}
  .check:last-child{border-bottom:none}
  .check .bx{width:21px;height:21px;border-radius:7px;flex:0 0 21px;display:grid;place-items:center;border:1.5px solid var(--line-2);background:#fff}
  .check.done .bx{background:var(--success);border-color:var(--success)}
  .check .bx svg{width:13px;height:13px;stroke:#fff;stroke-width:3.2}
  .check .t{font-weight:600;color:var(--ink-2)}
  .check.done .t{color:var(--ink);font-weight:600}
  .check.pending .t{color:var(--ink-3)}
  .mats{padding:6px 22px 18px}
  .mat{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:12px 0;border-bottom:1px solid var(--line-2);font-size:13.5px}
  .mat:last-child{border-bottom:none}
  .mat .nm{font-weight:600;color:var(--ink)}
  .mat .qt{font-weight:800;color:var(--primary);white-space:nowrap}
  .sec-empty{padding:30px 22px;text-align:center;color:var(--ink-3);font-size:13px;font-weight:600;line-height:1.5}
  .sec-empty svg{width:34px;height:34px;stroke:var(--ink-4);stroke-width:1.7;margin-bottom:10px}

  /* nota de observações */
  .note{display:flex;gap:13px;padding:16px 18px;background:linear-gradient(160deg,#F8FBFE,#F2F7FC);border:1px solid var(--line);border-radius:var(--r);margin-top:20px;font-size:13.5px;line-height:1.55;color:var(--ink-2);box-shadow:var(--sh-sm)}
  .note .ic{flex:0 0 20px;margin-top:1px;color:var(--primary)}
  .note .ic svg{width:20px;height:20px;stroke:currentColor;stroke-width:2}
  .note b{color:var(--ink)}

  /* ============ Responsivo ============ */
  @media(max-width:1120px){
    .stats{grid-template-columns:repeat(3,1fr)}
    .dgrid{grid-template-columns:1fr}
  }
  @media(max-width:900px){
    .grid.two{grid-template-columns:1fr!important}
  }
  @media(max-width:860px){
    .sidebar{display:none}
    .topbar{padding:13px 18px}
    .content{padding:22px 16px 110px;max-width:none}
    .tabbar{display:flex;position:fixed;left:0;right:0;bottom:0;z-index:40;background:rgba(255,255,255,.93);backdrop-filter:saturate(180%) blur(16px);border-top:1px solid var(--line);padding:9px 8px calc(9px + env(safe-area-inset-bottom))}
    .tabbar button{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px 4px;color:var(--ink-3);font-size:11px;font-weight:700;border-radius:12px;transition:color .15s}
    .tabbar button svg{width:22px;height:22px;stroke:currentColor;stroke-width:2}
    .tabbar button.active{color:var(--primary)}
    .hero{padding:26px 22px;border-radius:18px}
    .alloc-legend{grid-template-columns:1fr 1fr;gap:16px 18px}
    .company .nm,.company .sg{display:none}
    .company{padding:6px;border-radius:11px}
    .sec{margin:28px 2px 14px}
  }
  @media(max-width:640px){
    .stats{grid-template-columns:1fr 1fr;gap:12px}
    .stat{padding:15px}
    .stat .n{font-size:24px}
    .gallery{grid-template-columns:1fr 1fr;gap:11px}
    .dhead{padding:20px;gap:15px}
    .dhead .big{width:50px;height:50px;flex-basis:50px}
    .dhead .t{font-size:19px}
    .fin-grid{grid-template-columns:1fr 1fr}

    /* OS card reflow */
    .osr__body{padding:14px 14px 14px 18px}
    .osr__chev{display:none}
    .osr__title{font-size:14px}
    .os-controls{flex-direction:column;align-items:stretch}
    .os-sort select{width:100%}

    /* tabela → cartões */
    table thead{display:none}
    table,table tbody,table tr,table td{display:block;width:100%}
    table tbody tr{background:#fff;border:1px solid var(--line);border-radius:13px;margin:0 16px 11px;padding:5px 2px;box-shadow:var(--sh-sm)}
    .tbl-scroll{overflow:visible;padding-top:6px}
    table tbody td{display:flex;align-items:center;justify-content:space-between;gap:16px;border:none;padding:10px 16px;text-align:right}
    table tbody td::before{content:attr(data-label);font-weight:700;color:var(--ink-2);text-align:left;font-size:12px;text-transform:uppercase;letter-spacing:.3px;white-space:nowrap}
    table tbody td.t-cell::before{align-self:flex-start;padding-top:1px}
    table tbody td .t-desc,table tbody td .t-sub{text-align:right}
    td.amount{justify-content:space-between}
    .strip{flex-direction:column;gap:13px}
  }
  @media(max-width:380px){
    .stats{grid-template-columns:1fr 1fr}
    .bal{font-size:34px}
  }

  /* ============ Responsivo — novos componentes da OS ============ */
  @media(max-width:760px){
    .dgrid{grid-template-columns:1fr}
  }
  @media(max-width:640px){
    .os-kpis{grid-template-columns:1fr 1fr;gap:11px}
    .os-kpi{padding:13px 14px;gap:11px}
    .os-kpi .ic{width:36px;height:36px;flex-basis:36px}
    .os-kpi .tx .n{font-size:18px}
    .team,.appt,.checks,.mats{padding-left:16px;padding-right:16px}
    .scope{padding-left:16px;padding-right:16px}
    .team-resp .sup{margin-left:0;text-align:left;flex:1 0 100%;margin-top:4px}
    .team-member .hrs .l{display:none}
    .appt-row{flex-wrap:wrap}
    .appt-date{flex-basis:48px}
    .appt-h{order:3;width:100%;text-align:left;align-self:auto;margin-top:2px;display:flex;gap:7px;align-items:baseline}
    .appt-h .l{order:2}
    .appt-foot{padding-left:16px;padding-right:16px}
    .note{padding:14px 15px}
  }
  @media(max-width:420px){
    .os-kpis{grid-template-columns:1fr 1fr}
    .team-resp .av{width:42px;height:42px;flex-basis:42px;font-size:14px}
    .ppl{font-size:11px}
  }

  /* ============ Ajustes da revisão ============ */
  /* stat cards clicáveis (atalho por categoria) */
  .statbtn{cursor:pointer;text-align:left;width:100%;font-family:inherit;position:relative}
  .statbtn:hover{transform:translateY(-3px);box-shadow:var(--sh-md);border-color:var(--primary-2)}
  .statbtn:active{transform:translateY(-1px)}
  .stat .go{position:absolute;top:14px;right:14px;color:var(--ink-4);opacity:0;transition:opacity .15s,color .15s}
  .statbtn:hover .go{opacity:1;color:var(--primary)}
  .stat .go svg{width:16px;height:16px;stroke:currentColor;stroke-width:2.6}

  /* CTA Solicitar OS (WhatsApp) */
  .cta-os{display:inline-flex;align-items:center;justify-content:center;gap:9px;padding:12px 18px;border-radius:12px;background:#25D366;color:#fff;font-size:14px;font-weight:800;box-shadow:0 8px 20px rgba(37,211,102,.34);transition:transform .12s,filter .12s}
  .cta-os:hover{transform:translateY(-1px);filter:brightness(1.05)}
  .cta-os:active{transform:translateY(0)}
  .cta-os svg{width:19px;height:19px;fill:currentColor}
  .hero .cta-os{background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.30);box-shadow:none;-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px)}
  .hero .cta-os:hover{background:rgba(255,255,255,.26)}
  .cta-os--block{width:100%}
  .osr__val .l{display:block;margin-top:1px}

  /* agenda (próximos agendamentos): tipo + horas previstas */
  .agenda{cursor:pointer;border-radius:12px;transition:background .14s}
  .agenda:hover{background:var(--line-2)}
  .agenda-tipo{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:800;padding:3px 11px;border-radius:999px}
  .agenda-tipo .ad{width:6px;height:6px;border-radius:50%;background:currentColor}
  .sec-empty.tight{padding:26px 22px}

  /* extrato em cartões compactos (3 linhas, tipo em destaque) */
  .ext-list{display:flex;flex-direction:column;gap:10px;padding:16px}
  .ext-card{border:1px solid var(--line);border-left:4px solid var(--xc,#94A3B8);border-radius:12px;padding:11px 14px;background:#fff;box-shadow:var(--sh-sm)}
  .ext-r1{display:flex;align-items:center;justify-content:space-between;gap:12px}
  .ext-tipo{display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:800;color:var(--xc,#475569)}
  .ext-tipo .d{width:8px;height:8px;border-radius:50%;background:var(--xc,#94A3B8)}
  .ext-val{font-size:16px;font-weight:900;letter-spacing:-.3px;white-space:nowrap}
  .ext-r2{font-size:13px;font-weight:600;color:var(--ink);margin-top:5px;line-height:1.35}
  .ext-r2 small{color:var(--ink-3);font-weight:700}
  .ext-r3{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:6px;font-size:11.5px;color:var(--ink-3);font-weight:600}
  .ext-r3 .sld{color:var(--ink-2);font-weight:700}

  /* escopo: "ler mais" */
  .scope-txt.clamp:not(.open){display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden}
  .scope-more{margin-top:11px;font-size:12.5px;font-weight:800;color:var(--primary);display:inline-flex;align-items:center;gap:6px}
  .scope-more svg{width:14px;height:14px;stroke:currentColor;stroke-width:2.4;transition:transform .18s}
  .scope-more.open svg{transform:rotate(180deg)}

  /* timeline: hora + detalhe */
  .tl-when{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:2px}
  .tl-time{font-size:11px;font-weight:800;color:var(--primary);background:#E6F0FB;padding:2px 9px;border-radius:7px}

  /* conclusão (seção final da OS) */
  .concl{padding:6px 22px 22px}
  .concl-card{display:flex;gap:14px;align-items:flex-start;padding:16px;border-radius:14px;background:linear-gradient(160deg,#EAF8F0,#E2F5EA);border:1px solid #BFE8CF}
  .concl-card.pending{background:linear-gradient(160deg,#FFF8EC,#FDF2DC);border-color:#FCE3B6}
  .concl-card .ic{width:42px;height:42px;border-radius:12px;flex:0 0 42px;display:grid;place-items:center;background:var(--success);color:#fff}
  .concl-card.pending .ic{background:var(--warning)}
  .concl-card .ic svg{width:22px;height:22px;stroke:#fff;stroke-width:2.4}
  .concl-tx{min-width:0}
  .concl-tx .t{font-size:14.5px;font-weight:800}
  .concl-tx .p{font-size:13.5px;color:var(--ink-2);margin-top:6px;line-height:1.55}
  .concl-meta{display:flex;flex-wrap:wrap;gap:8px;margin-top:13px}
  @media(max-width:640px){
    .ext-list{padding:12px}
    .dash-cta{position:sticky;bottom:78px;z-index:30}
  }
</style>

<script>
/* =================================================================
   DADOS — servidos pela API do Expert Work (Node), isolados por login.
   O login (/api/login) devolve o dashboard JÁ DERIVADO do ledger; o
   navegador nunca recebe dados de outra empresa nem senha alguma.
   ================================================================= */
let TOKEN=null;  // token de sessão obtido no login (/api/login)

/* ---------- Estado ---------- */
let D=null, current='dashboard', chartServico=null, chartTipo=null;
let osFilter='todas', osQuery='', osSort='recentes';
const norm=s=>(s||'').toString().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');

/* ---------- Formatadores ---------- */
let _bf=null,_bc=null;
function BRL(){const c=(D&&D.creditos&&D.creditos.moeda)||'BRL';if(c!==_bc){_bf=new Intl.NumberFormat('pt-BR',{style:'currency',currency:c});_bc=c;}return _bf;}
const money = v => v==null ? '—' : BRL().format(v);
const moneyShort = v => 'R$ '+new Intl.NumberFormat('pt-BR',{maximumFractionDigits:0}).format(v);
const nDec = v => new Intl.NumberFormat('pt-BR',{minimumFractionDigits:2}).format(v);
function fmtDate(iso){if(!iso)return '—';const[y,m,d]=iso.split('-');return `${d}/${m}/${y}`;}
function fmtDateLong(iso){if(!iso)return '—';return new Date(iso+'T00:00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'long',year:'numeric'});}
function fmtDateTime(iso){return new Date(iso).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});}
const MES=['JAN','FEV','MAR','ABR','MAI','JUN','JUL','AGO','SET','OUT','NOV','DEZ'];

/* ---------- Mapas ---------- */
const STATUS={solicitada:{l:'Solicitada',c:'b-slate'},aberta:{l:'Aberta',c:'b-blue'},em_andamento:{l:'Em andamento',c:'b-amber'},concluida:{l:'Concluída',c:'b-green'},cancelada:{l:'Cancelada',c:'b-red'}};
const STATUS_COLOR={solicitada:'#94A3B8',aberta:'#1976D2',em_andamento:'#F59E0B',concluida:'#22C55E',cancelada:'#EF4444'};
const PRIO={alta:{l:'Alta',c:'b-red'},media:{l:'Média',c:'b-amber'},baixa:{l:'Baixa',c:'b-slate'}};
const TIPO={corretiva:'Corretiva',preventiva:'Preventiva',melhoria:'Melhoria',novo_projeto:'Novo projeto',reforma:'Reforma'};
const CS={finalizado:{l:'Finalizado',c:'b-green'},reservado:{l:'Reservado',c:'b-amber'},previsto:{l:'Previsto',c:'b-blue'},a_definir:{l:'A definir',c:'b-slate'}};
const METODO={pix:'PIX',transferencia_bancaria:'Transferência bancária',boleto:'Boleto',cartao:'Cartão'};
const ICON={corretiva:'<path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>',preventiva:'<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>',melhoria:'<path d="M2 20h20M5 20V8l4-3 4 3v12M13 20V11l4-3 3 2v10"/>',novo_projeto:'<rect x="3" y="3" width="18" height="18" rx="2"/><path d="M12 8v8M8 12h8"/>',reforma:'<path d="M21 2v6h-6M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6M21 12a9 9 0 0 1-15 6.7L3 16"/>'};
const ICOLOR={corretiva:['#FDEAEA','#EF4444'],preventiva:['#E4F7EC','#22C55E'],melhoria:['#FEF1D7','#F59E0B'],novo_projeto:['#E6F0FB','#1565C0'],reforma:['#EDE9FE','#7C3AED']};
const osIcon=t=>ICON[t]||ICON.corretiva;
const osColor=t=>ICOLOR[t]||ICOLOR.corretiva;
const badge=(map,k)=>{const x=map[k]||{l:k,c:'b-slate'};return `<span class="badge ${x.c}"><span class="b-dot"></span>${x.l}</span>`;};
const stBadge=s=>badge(STATUS,s), prBadge=p=>badge(PRIO,p);

/* ---------- Fotos (SVG inline → offline) ---------- */
function photoSVG(c1,c2,kind){
  const draw={
    painel:'<rect x="120" y="60" width="160" height="170" rx="10" fill="rgba(255,255,255,.14)"/><rect x="140" y="84" width="55" height="40" rx="5" fill="rgba(255,255,255,.5)"/><rect x="205" y="84" width="55" height="40" rx="5" fill="rgba(255,255,255,.32)"/><circle cx="155" cy="160" r="9" fill="#C9FFE0"/><circle cx="185" cy="160" r="9" fill="#FEE2A8"/><circle cx="215" cy="160" r="9" fill="#FBC4C4"/><rect x="140" y="190" width="120" height="9" rx="4" fill="rgba(255,255,255,.3)"/>',
    motor:'<circle cx="200" cy="145" r="62" fill="rgba(255,255,255,.16)"/><circle cx="200" cy="145" r="34" fill="rgba(255,255,255,.4)"/><circle cx="200" cy="145" r="12" fill="rgba(255,255,255,.7)"/><rect x="150" y="200" width="100" height="22" rx="6" fill="rgba(255,255,255,.22)"/>',
    cabos:'<path d="M120 90 C170 140 230 140 280 90" stroke="#C9FFE0" stroke-width="9" fill="none" stroke-linecap="round"/><path d="M120 130 C170 180 230 180 280 130" stroke="#FEE2A8" stroke-width="9" fill="none" stroke-linecap="round"/><path d="M120 170 C170 220 230 220 280 170" stroke="#FBC4C4" stroke-width="9" fill="none" stroke-linecap="round"/>',
    medidor:'<circle cx="200" cy="145" r="58" fill="rgba(255,255,255,.16)" stroke="rgba(255,255,255,.4)" stroke-width="4"/><line x1="200" y1="145" x2="232" y2="118" stroke="#fff" stroke-width="5" stroke-linecap="round"/><circle cx="200" cy="145" r="7" fill="#fff"/>'
  };
  const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="${c1}"/><stop offset="1" stop-color="${c2}"/></linearGradient></defs><rect width="400" height="300" fill="url(#g)"/>${draw[kind]||draw.painel}</svg>`;
  return 'data:image/svg+xml;utf8,'+encodeURIComponent(svg);
}
const PHOTOS={
  'OS-2026-003':[['Painel setor B','#1565C0','#1976D2','painel'],['Conexões','#1976D2','#2196F3','cabos'],['Inversor','#0C2440','#1565C0','medidor'],['Cabeamento','#1976D2','#42A5F5','cabos']],
  'OS-2026-004':[['Esteira A','#B5710A','#F59E0B','motor'],['Rolamento','#92560A','#F59E0B','motor'],['Motor redutor','#1565C0','#1976D2','motor']],
  'OS-2026-007':[['Motor prensa 3','#C62828','#EF4444','motor'],['Bobinamento','#1565C0','#1976D2','cabos'],['Quadro de força','#0C2440','#1565C0','painel']],
  'OS-B-003':[['Linha de envase','#1565C0','#1976D2','painel'],['Bicos assépticos','#1976D2','#2196F3','cabos'],['Painel de controle','#0C2440','#1565C0','medidor']],
  'OS-C-005':[['Calandra','#B5710A','#F59E0B','motor'],['Sistema hidráulico','#1565C0','#1976D2','medidor'],['Cilindros','#92560A','#F59E0B','motor']],
  'OS-C-007':[['Bomba tinturaria','#1565C0','#1976D2','motor'],['Tubulação','#1976D2','#42A5F5','cabos'],['Quadro de força','#0C2440','#1565C0','painel']],
  '_default':[['Inspeção','#1565C0','#1976D2','painel'],['Componentes','#1976D2','#42A5F5','cabos'],['Medição','#0C2440','#1565C0','medidor']]
};
const photosFor=id=>PHOTOS[id]||PHOTOS._default;

/* ---------- Timeline de atividades (derivada de equipe + apontamentos) ---------- */
function timelineFor(os){
  const e=os.equipe||{};
  const quem=os.solicitante?os.solicitante.nome:'a operação';
  const t=[{t:'OS criada',d:fmtDate(os.data_abertura),x:`Ordem registrada por ${quem} com prioridade ${(PRIO[os.prioridade]||{}).l||os.prioridade}.`,color:'var(--primary)'}];
  const r={solicitada:0,aberta:1,em_andamento:2,concluida:3,cancelada:2}[os.status]??1;
  if(r>=1)t.push({t:'Equipe designada',d:fmtDate(os.data_abertura),x:e.qtd_profissionais?`${e.qtd_profissionais} profissionais da ${e.area||'equipe técnica'} sob responsabilidade de ${e.responsavel}.`:'Equipe técnica alocada para o atendimento.',color:'var(--primary-2)'});
  if(r>=2){const d0=(os.apontamentos&&os.apontamentos.length)?fmtDate(os.apontamentos[0].data):'Em curso';t.push({t:'Em atendimento',d:d0,x:`Execução em campo com apontamento de horas.${e.horas_realizadas?' '+fmtH(e.horas_realizadas)+' registradas até o momento.':''}`,color:'var(--warning)'});}
  if(os.status==='concluida')t.push({t:'Concluída',d:fmtDate(os.data_conclusao),x:`Serviço finalizado em ${diasOS(os)} dia(s). Crédito realizado: ${money(os.creditos.realizado)}${e.horas_realizadas?' · '+fmtH(e.horas_realizadas):''}.`,color:'var(--success)'});
  if(os.status==='cancelada')t.push({t:'Cancelada',d:fmtDate(os.data_conclusao),x:'Atendimento cancelado.',color:'var(--error)'});
  if(os.status==='solicitada')t.push({t:'Aguardando orçamento',d:fmtDate(os.data_abertura),x:'Definição de escopo e estimativa de créditos pendente.',color:'#94A3B8'});
  return t;
}

  const p=clean.split(/\s+/).filter(Boolean);
  return ((p[0]&&p[0][0]||'')+(p.length>1&&p[p.length-1][0]||'')).toUpperCase()||'—';
}

function diasOS(os){

function filterSortOS(){
  let a=D.ordens_de_servico.slice();

  if(osSort==='valor')a.sort((x,y)=>(y.creditos.realizado||0)-(x.creditos.realizado||0));

  else a.sort((x,y)=>y.data_abertura.localeCompare(x.data_abertura));

  <button class="back" onclick="go('oslist')"><svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7M19 12H5"/></svg>Voltar às ordens</button>

/* ----- KPIs ----- */
function osKpis(os,e,dias,real){
  const k=[];
  if(e&&e.qtd_profissionais>0){
    k.push(['#E6F0FB','#1565C0','<path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/>',e.qtd_profissionais,'Profissionais']);
    k.push(['#FEF1D7','#F59E0B','<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>',fmtH(e.horas_realizadas),'Horas em campo']);
    if(e.horas_previstas!=null) k.push(['#E4F7EC','#22C55E','<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>',fmtH(e.horas_previstas),'Horas previstas']);
  }
  k.push(['#EDE9FE','#7C3AED','<rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/>',dias+(dias>1?' dias':' dia'),os.status==='concluida'?'Duração':'Em aberto há']);
  return `<div class="os-kpis">${k.map(x=>`<div class="os-kpi"><div class="ic" style="background:${x[0]}"><svg viewBox="0 0 24 24" fill="none" stroke="${x[1]}" stroke-linecap="round" stroke-linejoin="round">${x[2]}</svg></div><div class="tx"><div class="n num">${x[3]}</div><div class="l">${x[4]}</div></div></div>`).join('')}</div>`;
}

/* ----- Equipe ----- */
function osEquipe(os,e){
  if(!e||!e.qtd_profissionais){
    return `<div class="card"><div class="card-h"><h3>Equipe em campo</h3></div>
      <div class="sec-empty"><svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 11h-6"/></svg>Equipe ainda não designada.<br>Será alocada após a aprovação do orçamento.</div></div>`;
  }
  const prevH=e.horas_previstas,realH=e.horas_realizadas,prg=prevH?Math.min(100,realH/prevH*100):0;
  const members=e.profissionais.map(p=>`
    <div class="team-member">
      <div class="av" style="${avatarStyle(p.especialidade)}">${inits(p.nome)}</div>
      <div class="mid"><div class="n">${p.nome}${p.lider?'<span class="lead-tag">Responsável</span>':''}</div>
        <div class="sub">${p.funcao} · ${p.matricula} · ${p.especialidade}</div></div>
      <div class="hrs"><div class="v num">${fmtH(p.horas)}</div><div class="l">trabalhadas</div></div>
    </div>`).join('');

    <div class="card-h"><h3>Equipe em campo</h3><span class="team-count"><svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/></svg>${e.qtd_profissionais} profissionais</span></div>
    <div class="team">
      <div class="team-resp">
        <div class="av" style="${avatarStyle(e.area||'Engenharia')}">${inits(e.responsavel)}</div>
        <div class="who"><div class="n">${e.responsavel}</div><div class="r">Responsável técnico${e.area?' · '+e.area:''}</div></div>
        <div class="sup"><div class="l">Supervisão</div><div class="v">${e.supervisor||'—'}</div></div>
      </div>
      ${members}
      <div class="team-total">
        <div><div class="tt-l">Total de horas trabalhadas</div><div class="tt-v num">${fmtH(realH)}${prevH?` <small>/ ${fmtH(prevH)} previstas</small>`:''}</div></div>
      </div>
    </div></div>`;
}

/* ----- Financeiro ----- */
function osFinanceiro(os,prev,real,prog,cs,e){

/* ----- Informações gerais ----- */
function osInfo(os,eq,e){
  const row=(k,v)=>`<div class="info-row"><span class="k">${k}</span><span class="v">${v}</span></div>`;
  const sla=os.sla?os.sla.prazo_atendimento+(os.sla.cumprido?' <span class="badge b-green" style="margin-left:5px"><span class="b-dot"></span>Cumprido</span>':''):'—';
  const conc=os.data_conclusao?fmtDateLong(os.data_conclusao):(os.sla?'Prevista para '+fmtDate(os.sla.data_conclusao_prevista):'Em aberto');

/* ----- Escopo e diagnóstico ----- */
function osEscopo(os){
  const txt=os.descricao||'—';

    </div></div>`;
}
function toggleScope(btn){const p=btn.parentElement.querySelector('.scope-txt');const open=p.classList.toggle('open');btn.classList.toggle('open',open);btn.firstChild.textContent=open?'Ler menos':'Ler mais';}
function adjustScope(){const p=document.querySelector('.scope-txt.clamp');if(!p)return;const btn=p.parentElement.querySelector('.scope-more');if(p.scrollHeight-p.clientHeight>4){btn.style.display='';}else{p.classList.remove('clamp');}}

/* ----- Apontamento de horas ----- */
function osApontamentos(os){
  const ap=os.apontamentos||[];
  if(!ap.length)return '';
  const esp=espByName(os);
  const rows=ap.map(a=>{
    const dt=new Date(a.data+'T00:00:00');
    const people=a.itens.map(it=>`<span class="ppl"><span class="dot" style="${avatarStyle(esp[it.nome])}">${inits(it.nome)}</span>${it.nome.replace(/\(.*?\)/g,'').split(/\s+/)[0]} <span class="h">${fmtH(it.horas)}</span></span>`).join('');
    return `<div class="appt-row">
      <div class="appt-date"><div class="d num">${String(dt.getDate()).padStart(2,'0')}</div><div class="m">${MES[dt.getMonth()]}</div></div>
      <div class="appt-main"><div class="a">${a.atividade}</div><div class="appt-people">${people}</div></div>
      <div class="appt-h"><div class="v num">${fmtH(a.horas_dia)}</div><div class="l">no dia</div></div>
    </div>`;
  }).join('');
  const total=ap.reduce((s,a)=>s+a.horas_dia,0);
  return `<div class="card" style="margin-top:20px">
    <div class="card-h"><h3>Apontamento de horas</h3><span class="sub">${ap.length} ${ap.length>1?'visitas':'visita'} em campo</span></div>
    <div class="appt">${rows}</div>
    <div class="appt-foot"><span class="fl">Total apontado</span><span class="fv num">${fmtH(total)}</span></div>
  </div>`;
}

/* ----- Serviço executado / checklist ----- */
function osServico(os){
  let items=[],title='Serviço executado';
  if(os.checklist&&os.checklist.length){items=os.checklist.map(c=>[c.item,c.concluido]);title='Checklist do plano';}
  else if(os.servico_executado&&os.servico_executado.length){items=os.servico_executado.map(s=>typeof s==='string'?[s,true]:[s.acao,s.concluido]);}
  if(!items.length)return `<div class="card"><div class="card-h"><h3>${title}</h3></div><div class="sec-empty"><svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>Sem registros de execução até o momento.</div></div>`;
  const done=items.filter(i=>i[1]).length;
  const rows=items.map(([t,d])=>`<div class="check ${d?'done':'pending'}"><span class="bx">${d?'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>':''}</span><span class="t">${t}</span></div>`).join('');
  return `<div class="card"><div class="card-h"><h3>${title}</h3><span class="sub num">${done}/${items.length}</span></div><div class="checks">${rows}</div></div>`;
}

/* ----- Materiais ----- */
function osMateriais(os){
  const m=os.materiais||[];
  if(!m.length)return `<div class="card"><div class="card-h"><h3>Materiais aplicados</h3></div><div class="sec-empty"><svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>Nenhum material registrado.</div></div>`;
  const rows=m.map(x=>`<div class="mat"><span class="nm">${x.item}</span><span class="qt num">${x.quantidade} ${x.unidade}</span></div>`).join('');
  return `<div class="card"><div class="card-h"><h3>Materiais aplicados</h3><span class="sub">${m.length} ${m.length>1?'itens':'item'}</span></div><div class="mats">${rows}</div></div>`;
}

/* ----- Timeline ----- */
function osTimeline(timeline){
  const tl=(timeline||[]).slice().sort((a,b)=>((a.data||'')+(a.hora||'')).localeCompare((b.data||'')+(b.hora||'')));
  if(!tl.length)return `<div class="card"><div class="card-h"><h3>Linha do tempo</h3></div><div class="sec-empty"><svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>Nenhum acontecimento registrado até o momento.</div></div>`;
  const C={abertura:'var(--primary)',orcamento:'var(--primary-2)',agendamento:'#7C3AED',mobilizacao:'var(--primary-2)',execucao:'var(--primary-3)',ocorrencia:'var(--warning)',pendencia:'var(--error)',andamento:'var(--warning)',conclusao:'var(--success)'};
  return `<div class="card"><div class="card-h"><h3>Linha do tempo</h3><span class="sub">${tl.length} eventos</span></div>
    <div class="timeline"><div class="tl-line"></div>${tl.map(it=>`<div class="tl"><span class="tl-dot" style="color:${C[it.marco]||'var(--ink-3)'}"></span><div class="tl-body"><div class="tl-t">${it.titulo}</div><div class="tl-d"><span class="tl-when"><span>${fmtDate(it.data)}</span>${it.hora?`<span class="tl-time">${it.hora}</span>`:''}</span></div><div class="tl-x">${it.descricao||''}</div></div></div>`).join('')}</div></div>`;
}

/* ----- Fotos ----- */
function osFotos(os){
  let items;
  if(Array.isArray(os.fotos)&&os.fotos.length){
    items=os.fotos.map(f=>({titulo:(f.titulo||'Foto'),src:f.src,real:true}));
  }else{
    items=photosFor(os.id).map(p=>({titulo:p[0],src:photoSVG(p[1],p[2],p[3]),real:false}));
  }
  const fb=photoSVG('#0C2440','#1565C0','painel');
  return `<div class="card"><div class="card-h"><h3>Fotos e anexos</h3><span class="sub">${items.length} ${items.length===1?'item':'itens'}</span></div>
    <div class="gallery">${items.map(it=>{const t=String(it.titulo).replace(/'/g,"\\'").replace(/"/g,'&quot;');return `<div class="ph" onclick="openModal(this.querySelector('img').src,'${t}')"><img src="${it.src}" loading="lazy" alt="${t}"${it.real?` onerror="this.onerror=null;this.src='${fb}'"`:''}><span class="tag">${it.titulo}</span></div>`;}).join('')}</div></div>`;
}
function osConclusao(os){
  const c=os.conclusao||{status:os.status,texto:'',data:null};
  const done=os.status==='concluida';
  const ic=done?'<path d="M20 6 9 17l-5-5"/>':'<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>';
  const meta=[];
  if(done){
    if(c.data)meta.push(`<span class="badge b-slate"><span class="b-dot"></span>Concluída em ${fmtDate(c.data)}</span>`);
    if(c.sla_cumprido===true)meta.push(`<span class="badge b-green"><span class="b-dot"></span>SLA cumprido</span>`);
    else if(c.sla_cumprido===false)meta.push(`<span class="badge b-red"><span class="b-dot"></span>SLA não cumprido</span>`);
    if(c.horas_realizadas!=null)meta.push(`<span class="badge b-blue"><span class="b-dot"></span>${fmtH(c.horas_realizadas)} trabalhadas</span>`);
    if(c.credito_realizado!=null)meta.push(`<span class="badge b-green"><span class="b-dot"></span>${money(c.credito_realizado)} realizado</span>`);
  }
  return `<div class="card" style="margin-top:20px"><div class="card-h"><h3>Conclusão</h3></div>
    <div class="concl"><div class="concl-card${done?'':' pending'}">
      <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round">${ic}</svg></div>
      <div class="concl-tx"><div class="t">${done?'Serviço concluído':'Conclusão pendente'}</div>
        <div class="p">${c.texto||'—'}</div>
        ${meta.length?`<div class="concl-meta">${meta.join('')}</div>`:''}
      </div>
    </div></div></div>`;
}

/* =================================================================
   Modal + Auth + Boot
   ================================================================= */
function openModal(src,cap){document.getElementById('modalImg').src=src;document.getElementById('modalCap').textContent=cap;document.getElementById('modal').classList.add('open');}
function closeModal(e){if(e&&e.target.tagName==='IMG'&&e.target.id==='modalImg')return;document.getElementById('modal').classList.remove('open');}
document.addEventListener('keydown',e=>{if(e.key==='Escape')document.getElementById('modal').classList.remove('open');});

async function doLogin(){
  const u=document.getElementById('luser').value.trim().toLowerCase();
  const p=document.getElementById('lpass').value;
  const btn=document.querySelector('.login-btn');
  if(btn)btn.disabled=true;
  try{
    const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({login:u,senha:p})});
    const j=await r.json().catch(()=>({}));
    if(!r.ok||j.status!==1||!j.dashboard){ showLoginErr(j.message||'Usuário ou senha inválidos.'); return; }
    TOKEN=j.token; D=j.dashboard;
    document.getElementById('loginErr').classList.remove('show');
    document.getElementById('login').style.display='none';
    document.getElementById('appShell').style.display='flex';
    document.getElementById('tabbar').style.display='';
    boot();
  }catch(err){
    showLoginErr('Falha de conexão com o servidor. Tente novamente.');
  }finally{
    if(btn)btn.disabled=false;
  }
}
function showLoginErr(msg){
  const e=document.getElementById('loginErr');
  e.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M12 8v5M12 16h.01"/></svg>'+msg;
  e.classList.add('show');
  document.getElementById('lpass').focus();
}
function logout(){
  if(TOKEN){fetch('/api/logout',{method:'POST',headers:{'Authorization':'Bearer '+TOKEN}}).catch(()=>{});}
  TOKEN=null;
  if(chartServico){chartServico.destroy();chartServico=null;}
  if(chartTipo){chartTipo.destroy();chartTipo=null;}
  D=null;current='dashboard';
  document.getElementById('content').innerHTML='';
  document.getElementById('appShell').style.display='none';
  document.getElementById('tabbar').style.display='none';
  document.getElementById('login').style.display='flex';
  document.getElementById('lpass').value='';
  setActive('dashboard');setTop('dashboard');
  window.scrollTo(0,0);
}
function boot(){
  const e=D.empresa;
  const ini=e.nome.split(/\s+/).filter(w=>w.length>2).slice(0,2).map(w=>w[0]).join('').toUpperCase();
  document.getElementById('companyAv').textContent=ini||'??';
  document.getElementById('companyName').textContent=e.nome;
  document.getElementById('companySeg').textContent=e.segmento+' · '+e.cnpj;
  const pr=D.metadata.periodo_referencia;
  document.getElementById('footMeta').innerHTML=`Período ${fmtDate(pr.inicio)} – ${fmtDate(pr.fim)}<br>Atualizado ${fmtDateTime(D.metadata.gerado_em)} · v${D.metadata.versao_api}`;
  go('dashboard');
}
// tabbar começa oculto até login
document.getElementById('tabbar').style.display='none';

// Os dados agora vêm da API no login (/api/login) — nada é pré-carregado,
// e o navegador nunca recebe o tenants.json.
</script>
</body>
